# $schema: https://raw.githubusercontent.com/semaphoreio/semaphore/98bb4752c79049d36324e8c76451cd704c7924f3/plumber/spec/priv/v1.0.yml
# yaml-language-server: $schema=https://raw.githubusercontent.com/semaphoreio/semaphore/98bb4752c79049d36324e8c76451cd704c7924f3/plumber/spec/priv/v1.0.yml
# This file is managed by ServiceBot plugin - Semaphore. The content in this file is created using a common
# template and configurations in service.yml.
# Any modifications made to version, name, agent and global_job_config will be overwritten by the generated
# content in nightly runs. Code changes made to the remaining sections will not be affected.
# For more information, please refer to the page:
# https://confluentinc.atlassian.net/wiki/spaces/Foundations/pages/2871296194/Add+SemaphoreCI
version: v1.0
name: build-test-release
agent:
  machine:
    type: s1-prod-ubuntu24-04-amd64-1

auto_cancel:
  running:
    when: "branch != 'main'"

execution_time_limit:
  hours: 1

queue:
  - when: "branch != 'main'"
    processing: parallel

global_job_config:
  prologue:
    commands:
      - checkout
      - make show-args
      - make init-ci
  epilogue:
    always:
      commands:
        - make epilogue-ci

blocks:
  - name: "Validate Skills"
    run:
      when: "change_in('/skills/', {default_branch: 'main'})"
    task:
      jobs:
        - name: "Skill Validator"
          commands:
            - go install github.com/agent-ecosystem/skill-validator/cmd/skill-validator@v1.3.0
            - skill-validator check skills || [ $? -eq 2 ]
        # Authoritative broken-link gate: sweeps every Markdown file (incl.
        # references/) for hard 404s AND docs.confluent.io soft-404s — coverage
        # skill-validator lacks. No Go needed; pure bash + curl. Exits 1 on a
        # broken link, failing the block.
        - name: "Check Skill Links"
          commands:
            - ./tools/check-links.sh skills
        # Scans skill files for embedded PII / secrets (real customer data,
        # keys, card numbers) using the detector bundled with the
        # confluent-skill-reviewer. Eval prompts, fixtures, and sample records
        # are supposed to use synthetic data only — this catches real data
        # before it lands on main.
        - name: "Scan for PII"
          commands:
            - python3 skills/confluent-skill-reviewer/scripts/scan_pii.py skills/ --exclude '*/mock-skills/leaky-data/*'

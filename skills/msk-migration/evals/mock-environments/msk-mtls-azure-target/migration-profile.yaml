# Mock environment for the mTLS + Azure cluster-type-and-auth cascade.
#
# Source uses mTLS auth. Customer's stated target is Confluent Cloud on
# Azure (plan.target_cloud: azure). Customer's target identity model is
# mTLS (carries the source-side cert infrastructure forward).
#
# The mTLS hard-limits row routes to cluster-types.html. The skill
# live-fetches the mTLS feature-comparison row to determine which target
# cluster types support mTLS on Azure. Per the current cluster-types.html
# matrix (verify live), Enterprise and Freight mTLS support is AWS only;
# only Dedicated supports mTLS on Azure / GCP. The combination of mTLS
# target on Azure therefore forces a fork:
#   (a) escalate to Dedicated (the only cluster type that supports mTLS
#       on Azure), OR
#   (b) route to SCRAM or API keys per the IC4 Auth Approach rule
#       (matrix-row citation + one-line rationale).
#
# Either resolution is valid; the eval accepts either path as long as the
# matrix outcome is cited and the Plan does NOT recommend Enterprise +
# mTLS on Azure (a setup-time blocker).
#
# Expected Plan behavior:
#   - Cluster Type Decision either escalates to Dedicated (citing the mTLS
#     row) or stays Enterprise with the auth recommendation routed to
#     SCRAM/API keys. Both paths cite cluster-types.html.
#   - Plan does NOT recommend Enterprise + mTLS on Azure.
#   - Auth Approach names the specific matrix outcome (which cluster type
#     fails the row on Azure) and cites the live URL inline per IC4.

source:
  platform: msk-provisioned
  cloud_provider: aws
  region: us-east-1
  kafka_version: 3.5.1
  migration_drivers: "Moving off MSK to Confluent Cloud on Azure; customer's enterprise PKI requires mTLS end-to-end."
  monthly_cost_usd: 26000

clusters:
  - name: secure-events
    broker_count: 6
    broker_instance_type: kafka.m5.large
    availability_zones: [us-east-1a, us-east-1b, us-east-1c]
    topic_count: 84
    partition_count_pre_replication: 1680
    replication_factor: 3
    peak_ingress_mbps: 110
    peak_egress_mbps: 320
    auth_types:
      - mtls
    network_accessibility: private
    vpc_topology: single-vpc
    acl_count: 24
    acl_source: kafka-acls

schema_registry:
  type: confluent-sr
  subject_count: 38

connectors:
  msk_connect_count: 0
  self_managed_connect_count: 0
  connector_types: []

downstream:
  tableflow_planned: false
  flink_planned: false
  lakehouse_planned: false

target_context:
  cc_reaches_source: null
  cc_egress_required: false
  source_sr_can_push_to_cc_sr: null
  target_identity_model: mtls  # Customer wants to keep mTLS end-to-end on the target.

plan:
  target_cluster_type: null
  target_cloud: azure  # Customer-stated target cloud — Azure. Exercises the mTLS-on-non-AWS path.
  target_region: null
  target_networking: null
  sizing_ecku_or_cku: null
  sizing_headroom_percent: null
  auth_mapping: {}
  switchover_approach: null
  pre_migration_requirements: []
  risks_acknowledged: []

# Mock environment for B3 downstream-behavior eval — mTLS on non-AWS
# target should NOT escalate to Dedicated.
#
# Source uses mTLS auth. Customer's stated target is Confluent Cloud on
# Azure (plan.target_cloud: azure as the customer-confirmed target).
# Customer's target identity model is mTLS (carries the source-side cert
# infrastructure forward).
#
# Before B3's HARDCODED→ROUTE conversion on the mTLS hard-limits row, this
# combination would have triggered a Dedicated escalation (the cached
# assumption was that Enterprise mTLS was AWS-only). Per the verified
# 2026-05-14 mTLS support matrix on cluster-types.html, Enterprise/Freight/
# Dedicated support mTLS on all clouds — so Enterprise (the skill's
# default) is the correct recommendation here. The hard-limits row is now
# a ROUTE that fetches cluster-types.html live; the eval verifies the
# downstream behavior change.
#
# Expected Plan behavior:
#   - Cluster Type Decision recommends Enterprise (NOT Dedicated).
#   - The mTLS-required-on-non-AWS hard-limit row is NOT cited as a
#     Dedicated escalation trigger.
#   - Plan cites cluster-types.html for the mTLS support verification.
#   - Auth Approach recommends SSL with client certs (mTLS) as the CC
#     target auth, per target_identity_model=mtls cascade.

source:
  platform: msk-provisioned
  cloud_provider: aws
  region: us-east-1
  kafka_version: 3.5.1
  migration_drivers: "Moving off MSK to Confluent Cloud on Azure; customer's enterprise PKI requires mTLS end-to-end."
  monthly_cost_usd: 26000

clusters:
  - name: secure-events
    broker_count: 6
    broker_instance_type: kafka.m5.large
    availability_zones: [us-east-1a, us-east-1b, us-east-1c]
    topic_count: 84
    partition_count_pre_replication: 1680
    replication_factor: 3
    peak_ingress_mbps: 110
    peak_egress_mbps: 320
    auth_types:
      - mtls
    network_accessibility: private
    vpc_topology: single-vpc
    acl_count: 24
    acl_source: kafka-acls

schema_registry:
  type: confluent-sr
  subject_count: 38

connectors:
  msk_connect_count: 0
  self_managed_connect_count: 0
  connector_types: []

downstream:
  tableflow_planned: false
  flink_planned: false
  lakehouse_planned: false

target_context:
  cc_reaches_source: null
  cc_egress_required: false
  source_sr_can_push_to_cc_sr: null
  target_identity_model: mtls  # Customer wants to keep mTLS end-to-end on the target.

# Plan-stage decisions (filled during Plan)
plan:
  target_cluster_type: null  # Plan should recommend enterprise per the default cluster-type rule
  target_cloud: azure  # Customer-stated target cloud — Azure. Exercises the mTLS-on-non-AWS path.
  target_region: null
  target_networking: null
  sizing_ecku_or_cku: null
  sizing_headroom_percent: null
  auth_mapping: {}
  switchover_approach: null
  pre_migration_requirements: []
  risks_acknowledged: []

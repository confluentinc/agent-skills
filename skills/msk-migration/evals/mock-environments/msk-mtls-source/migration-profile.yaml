# Mock environment for R3 — preserve a CC-supported source auth method.
#
# Source already uses mTLS, which Confluent Cloud supports for clients.
# target_identity_model is unset (null). Step 0 of the target-auth logic
# should preserve mTLS as the target (not default to SASL/PLAIN), with the
# "preserving source auth method — already Confluent-supported" rationale.
# This is the mTLS-preserve regression test.

source:
  platform: msk-provisioned
  cloud_provider: aws
  region: us-east-1
  kafka_version: 3.5.1
  migration_drivers: "Moving off MSK; clients already authenticate with mTLS and the customer wants to keep their PKI."
  monthly_cost_usd: 26000

clusters:
  - name: payments-mtls
    broker_count: 6
    broker_instance_type: kafka.m5.xlarge
    availability_zones: [us-east-1a, us-east-1b, us-east-1c]
    topic_count: 120
    partition_count_pre_replication: 2880
    replication_factor: 3
    p95_ingress_mbps: 90
    p95_egress_mbps: 270
    auth_types:
      - mtls
    network_accessibility: private
    vpc_topology: single-vpc
    acl_count: 54
    acl_source: kafka-acls

schema_registry:
  type: confluent-sr
  subject_count: 88

connectors:
  msk_connect_count: 0
  self_managed_connect_count: 0
  connector_types: []

downstream:
  tableflow_planned: false
  flink_planned: false
  lakehouse_planned: false

target_context:
  target_identity_model: null  # Unset — Step 0 should preserve the CC-supported mTLS source method, not default to API Keys

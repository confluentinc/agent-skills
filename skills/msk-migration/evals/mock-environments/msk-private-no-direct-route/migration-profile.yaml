# Mock environment for the private-MSK-no-direct-route CL eval.
#
# Tests that the Plan handles a private MSK source where CC has no direct
# route to the MSK VPC. Simulates a customer who has private MSK and
# confirmed (after the cascade question) that their PNI VPC does not have
# a route to the MSK VPC. Cluster Linking is destination-initiated for an
# MSK source regardless; what changes is the reachability path. The Plan
# should:
#   - Recommend an additive Egress PrivateLink Endpoint for CC to reach
#     back to the private source.
#   - Keep PNI as the ingress networking type (additive, not a swap).
#   - Emit destination-initiated CL direction (MSK has no other option).
#   - Trigger Cluster Linking — Special Considerations.
#   - Cite aws-egress-privatelink-esku.html for current prereqs.

source:
  platform: msk-provisioned
  cloud_provider: aws
  region: us-east-1
  kafka_version: 3.5.1
  migration_drivers: "Moving off MSK; MSK is in a locked-down VPC with no inbound route from CC's planned PNI VPC."
  monthly_cost_usd: 18000

clusters:
  - name: payments-isolated
    broker_count: 3
    broker_instance_type: kafka.m5.large
    availability_zones: [us-east-1a, us-east-1b, us-east-1c]
    topic_count: 38
    partition_count_pre_replication: 720
    replication_factor: 3
    peak_ingress_mbps: 90
    peak_egress_mbps: 240
    auth_types:
      - scram
    network_accessibility: private
    vpc_topology: single-vpc
    acl_count: 22
    acl_source: kafka-acls

schema_registry:
  type: confluent-sr
  subject_count: 26

connectors:
  msk_connect_count: 0
  self_managed_connect_count: 0
  connector_types: []

downstream:
  tableflow_planned: false
  flink_planned: false
  lakehouse_planned: false

target_context:
  cc_reaches_source: false  # No direct route: customer indicated their PNI VPC has no route to the MSK VPC. Cascade → keep PNI ingress + add an additive Egress PrivateLink Endpoint so CC can reach back to the private source. CL stays destination-initiated (MSK has no other option).
  cc_egress_required: false  # No CC managed connectors needing customer-side egress. The egress endpoint here is for the CL replication pull (cc_reaches_source: false), not for managed-connector egress.

# Mock environment for R10 — multi-listener with an unauthenticated listener.
#
# The cluster runs two listeners at once: SASL/SCRAM and unauthenticated.
# Confluent Cloud has no unauthenticated/plaintext equivalent, so clients
# using the unauthenticated listener break at cutover and must move to a
# CC-supported method before cutover. Red Flags Row 17 triggers; the move
# rolls into the Pre-Migration Workstream.

source:
  platform: msk-provisioned
  cloud_provider: aws
  region: us-east-1
  kafka_version: 3.5.1
  migration_drivers: "Moving off MSK; some internal clients still connect on a plaintext listener."
  monthly_cost_usd: 16000

clusters:
  - name: shared-ingest
    broker_count: 6
    broker_instance_type: kafka.m5.large
    availability_zones: [us-east-1a, us-east-1b, us-east-1c]
    topic_count: 90
    partition_count_pre_replication: 1800
    replication_factor: 3
    p95_ingress_mbps: 80
    p95_egress_mbps: 240
    auth_types:  # Multiple listeners at once — reason over the full set
      - scram
      - unauthenticated
    network_accessibility: private
    vpc_topology: single-vpc
    acl_count: 30
    acl_source: kafka-acls

schema_registry:
  type: confluent-sr
  subject_count: 50

connectors:
  msk_connect_count: 0
  self_managed_connect_count: 0
  connector_types: []

downstream:
  tableflow_planned: false
  flink_planned: false
  lakehouse_planned: false

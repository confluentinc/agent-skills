source:
  platform: msk-provisioned
  cloud_provider: aws
  region: us-east-1
  kafka_version: 3.5.1
  migration_drivers: "Moving off MSK to reduce operational overhead. No hard deadline."
  monthly_cost_usd: 18000

clusters:
  - name: orders-prod
    broker_count: 6
    broker_instance_type: kafka.m5.large
    availability_zones: [us-east-1a, us-east-1b, us-east-1c]
    topic_count: 84
    partition_count_pre_replication: 2400
    replication_factor: 3
    peak_ingress_mbps: 180
    peak_egress_mbps: 540
    auth_types:
      - scram
    network_accessibility: private
    vpc_topology: single-vpc
    acl_count: 42
    acl_source: kafka-acls

schema_registry:
  type: confluent-sr
  subject_count: 68

connectors:
  msk_connect_count: 4
  self_managed_connect_count: 0
  connector_types:
    - s3-sink
    - debezium-postgres

downstream:
  tableflow_planned: false
  flink_planned: false
  lakehouse_planned: false

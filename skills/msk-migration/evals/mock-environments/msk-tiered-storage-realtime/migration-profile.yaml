# Mock environment for B4 Historical Data Handling eval.
#
# Source uses MSK tiered storage (storage_mode: TIERED) with a non-trivial
# tiered volume. Customer has confirmed downstream consumers are real-time
# only — they do not need access to historical data on the target post-
# migration. consumer_history_requirement: not_required.
#
# Expected Plan behavior:
#   - Historical Data Handling section emitted (renamed from "Tiered
#     Storage" per B4).
#   - The not_required row defers to the Confluent account team (skipping
#     history is not a documented default CL flow).
#   - Cascade reasoning visible: consumer_history_requirement +
#     not_required + account team co-occurrence within the section.
#   - migrate-cc.html cited for CL default backfill behavior.
#   - Tiered-storage cost callout present (tiered + S3 + cost/backfill).
#   - Separated from MSK decommissioning timeline (Invariant 5).

source:
  platform: msk-provisioned
  cloud_provider: aws
  region: us-east-1
  kafka_version: 3.5.1
  migration_drivers: "Moving off MSK; consumers are real-time only — no historical replay required on the target."
  monthly_cost_usd: 32000

clusters:
  - name: stream-prod
    broker_count: 6
    broker_instance_type: kafka.m7g.xlarge
    availability_zones: [us-east-1a, us-east-1b, us-east-1c]
    topic_count: 78
    partition_count_pre_replication: 1560
    replication_factor: 3
    peak_ingress_mbps: 130
    peak_egress_mbps: 340
    auth_types:
      - scram
    network_accessibility: private
    vpc_topology: single-vpc
    acl_count: 22
    acl_source: kafka-acls
    storage_mode: TIERED  # MSK tiered storage is enabled
    peak_tiered_storage_gb: 4800  # 4.8 TB of tiered (S3-backed) data — material backfill cost if CL replicates it

schema_registry:
  type: confluent-sr
  subject_count: 42

connectors:
  msk_connect_count: 0
  self_managed_connect_count: 0
  connector_types: []

downstream:
  tableflow_planned: false
  flink_planned: false
  lakehouse_planned: false

target_context:
  cc_reaches_source: null
  cc_egress_required: false
  source_sr_can_push_to_cc_sr: null
  target_identity_model: null
  consumer_history_requirement: not_required  # Real-time-only consumers; no historical replay needed on target. Cascade → defer to Confluent account team.

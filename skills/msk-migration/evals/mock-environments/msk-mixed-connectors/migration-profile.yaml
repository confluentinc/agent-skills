# Mock environment for B5 per-connector classification eval.
#
# Tests the Plan's per-connector decision pattern (CC catalog lookup +
# defer-to-account-team for no-equivalent connectors). Connectors mix:
#   - `s3-sink`: has a CC managed equivalent (`cc-amazon-s3-sink.html`).
#     Plan should route to CMU + `kcp create-asset migrate-connectors msk`.
#   - `custom-internal-validator`: no CC managed equivalent (a customer-
#     specific name with no published connector). Plan should defer to
#     the Confluent account team — options include custom connector,
#     alternative target architecture, or staying on a self-managed
#     Connect cluster.

source:
  platform: msk-provisioned
  cloud_provider: aws
  region: us-east-1
  kafka_version: 3.5.1
  migration_drivers: "Moving off MSK; need to retain S3 archival pipeline and an internal Connect-based validator."
  monthly_cost_usd: 22000

clusters:
  - name: data-pipeline
    broker_count: 6
    broker_instance_type: kafka.m5.large
    availability_zones: [us-east-1a, us-east-1b, us-east-1c]
    topic_count: 90
    partition_count_pre_replication: 1800
    replication_factor: 3
    peak_ingress_mbps: 120
    peak_egress_mbps: 320
    auth_types:
      - scram
    network_accessibility: private
    vpc_topology: single-vpc
    acl_count: 28
    acl_source: kafka-acls

schema_registry:
  type: confluent-sr
  subject_count: 54

connectors:
  msk_connect_count: 2
  self_managed_connect_count: 0
  connector_types:
    - s3-sink
    - custom-internal-validator

downstream:
  tableflow_planned: false
  flink_planned: false
  lakehouse_planned: false

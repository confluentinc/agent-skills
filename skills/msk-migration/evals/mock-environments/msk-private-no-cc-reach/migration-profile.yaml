# Mock environment for B1 source-initiated CL direction eval.
#
# Tests that the Plan emits a "Cluster Linking direction" section with
# source-initiated derivation when target_context.cc_reaches_source is
# false. Simulates a customer who has private MSK and confirmed (after
# the cascade question) that their PNI VPC does not have a route to the
# MSK VPC. The Plan should:
#   - Derive source-initiated CL direction (link.mode=SOURCE).
#   - Trigger Cluster Linking — Special Considerations.
#   - Surface that KCP does not orchestrate source-initiated link setup.
#   - Cite private-networking.html for current prereqs.
#   - Note that link.mode=SOURCE is permanent.

source:
  platform: msk-provisioned
  cloud_provider: aws
  region: us-east-1
  kafka_version: 3.5.1
  migration_drivers: "Moving off MSK; MSK is in a locked-down VPC with no inbound route from CC's planned PNI VPC."
  monthly_cost_usd: 18000

clusters:
  - name: payments-isolated
    broker_count: 3
    broker_instance_type: kafka.m5.large
    availability_zones: [us-east-1a, us-east-1b, us-east-1c]
    topic_count: 38
    partition_count_pre_replication: 720
    replication_factor: 3
    peak_ingress_mbps: 90
    peak_egress_mbps: 240
    auth_types:
      - scram
    network_accessibility: private
    vpc_topology: single-vpc
    acl_count: 22
    acl_source: kafka-acls

schema_registry:
  type: confluent-sr
  subject_count: 26

connectors:
  msk_connect_count: 0
  self_managed_connect_count: 0
  connector_types: []

downstream:
  tableflow_planned: false
  flink_planned: false
  lakehouse_planned: false

target_context:
  cc_reaches_source: false  # Customer indicated their PNI VPC has no route to the MSK VPC. Cascade → source-initiated CL (link.mode=SOURCE).
  cc_egress_required: false  # No CC managed connectors needing customer-side egress. PNI default still applies — egress exception not triggered. The CL direction failure mode is independent of networking choice here.

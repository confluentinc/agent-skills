name: PII scan

# Scans skill files for embedded PII / secrets (real customer data, keys,
# card numbers) using the detector bundled with the confluent-skill-reviewer.
# Eval prompts, fixtures, and sample records are supposed to use synthetic
# data only — this catches real data before it lands on main.

on:
  pull_request:
    paths:
      - "skills/**"
      - ".github/workflows/pii-scan.yml"
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Scan skills/ for embedded PII
        run: |
          python3 skills/confluent-skill-reviewer/scripts/scan_pii.py \
            skills/ \
            --exclude '*/mock-skills/leaky-data/*'
